services:
  - type: keyvalue
    name: clipforge-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: clipforge-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh scripts/render-start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: clipforge-redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      - key: AI_PROVIDER
        value: mock
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: MAX_UPLOAD_BYTES
        value: "1073741824"
      - key: CLIPFORGE_TMP_DIR
        value: /tmp/clipforge
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: RUN_SEED_ON_START
        value: "false"

  - type: worker
    name: clipforge-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    dockerCommand: sh scripts/render-worker.sh
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: clipforge-redis
          property: connectionString
      - key: WEB_EXTERNAL_URL
        fromService:
          type: web
          name: clipforge-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: clipforge-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      - key: AI_PROVIDER
        value: mock
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: MAX_UPLOAD_BYTES
        value: "1073741824"
      - key: CLIPFORGE_TMP_DIR
        value: /tmp/clipforge
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
      - key: WORKER_CONCURRENCY
        value: "2"

databases:
  - name: clipforge-postgres
    databaseName: clipforge
    user: clipforge
    plan: free
    postgresMajorVersion: "16"
